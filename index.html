<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title> Tiles Pro v5.0.2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}


    .refresh{
background:#28a745;
margin-bottom:15px;
}

.refresh:hover{
background:#218838;
}

    
h1{
text-align:center;
margin-bottom:20px;
color:#333;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 18px;
margin-top:12px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}


    .table-container{
width:100%;
overflow-x:auto;
margin-top:15px;
border-radius:10px;
}

table{
    width:100%;
    min-width:unset;
    table-layout:fixed;
}
    

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
white-space:nowrap;
}

th{
background:#007bff;
color:white;
position:sticky;
top:0;
}

.edit,
.delete{
padding:8px 12px;
margin:2px;
border-radius:5px;
}

.edit{
background:#ffc107;
color:black;
}

.delete{
background:#dc3545;
color:white;
}



.stock-box{
display:inline-flex;
flex-direction:column;
align-items:center;
background:#f8f9fa;
padding:8px 12px;
border-radius:10px;
min-width:110px;
}

.stock-count{
font-size:18px;
font-weight:bold;
color:#007bff;
}

.stock-time{
margin-top:4px;
font-size:11px;
color:#666;
line-height:1.3;
}

    

    
    #adminPanel{
display:none;
}

    

    

.search{
margin-bottom:15px;
}



 .bottom-buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin:20px auto;
    flex-wrap:wrap;
}

.bottom-buttons button{
    min-width:180px;
    height:45px;
    margin:0;
}



    .total-stock{
    margin:20px auto 0;
    width:fit-content;
    background:#fff;
    border:2px solid #e3e3e3;
    border-radius:10px;
    padding:15px 30px;
    font-size:28px;
    font-weight:bold;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.total-stock span{
    color:#007bff;
    font-size:36px;
}

    
    
.drag-cell{
    width:45px;
    text-align:center;
}

.drag-handle{
    cursor:grab;
    font-size:22px;
    user-select:none;
}

.dragging{
    opacity:.45;
    background:#d8ecff!important;
}

.drop-target{
    border-top:4px solid #007bff;
}





    .new-badge{
display:inline-block;
margin-left:8px;
padding:2px 8px;
background:#2ecc71;
color:#000;
font-size:10px;
font-weight:bold;
border-radius:999px;
text-transform:uppercase;
vertical-align:middle;
box-shadow:0 1px 4px rgba(0,0,0,.15);
animation:newPulse 1.5s infinite;
}

@keyframes newPulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}





    @media (max-width:768px){

body{
    padding:8px;
}

.card{
    padding:10px;
}

th,
td{
    padding:6px 4px;
    font-size:12px;
}

button{
    padding:5px 8px;
    font-size:11px;
}

.stock-box{
    min-width:auto;
    padding:4px 6px;
}

.stock-count{
    font-size:14px;
}

.stock-time{
    font-size:9px;
}

}


    @media (max-width:768px){

.search{
    font-size:14px;
    padding:8px;
}

}


    @media (max-width:768px){

td button{
    display:block;
    width:100%;
    margin:3px 0;
}

}



    @media (max-width:768px){

.total-stock{
    font-size:18px;
    padding:10px;
}

.total-stock span{
    font-size:24px;
}

}




    th:nth-child(2),
td:nth-child(2){
    width:70px;
}

th:nth-child(3),
td:nth-child(3){
    width:55px;
}

th:nth-child(4),
td:nth-child(4){
    width:65px;
}

th:nth-child(5),
td:nth-child(5){
    width:85px;
}





    

    
</style>
</head>

<body>

<div class="container">





   <h1> TILES PRO </h1>

    

<!-- Hidden until admin logs in -->
<div id="adminPanel" class="card" style="display:none;">
    
<input id="name" placeholder="Tile Name">

<input id="size" placeholder="Size">

<input id="design" placeholder="Design Number">

<input id="boxes" type="number" placeholder="Boxes">

<button id="saveBtn" onclick="saveTile()">
Save Tile
</button>

</div>

    





    <div class="card">

<input
class="search"
id="search"
placeholder="Search..."
onkeyup="searchTile()">





    
    <div class="table-container">

<table>

    <thead>
<tr>
    <th id="dragHead" style="display:none;">↕</th>
    <th>Name</th>
    <th>Size</th>
    <th>Design</th>
    <th>Boxes</th>
    <th>Action</th>
</tr>
</thead>

<tbody id="tableBody">

</tbody>








    </table>

</div>

</div>

<div class="bottom-buttons">

    <button onclick="adminLogin()" id="adminBtn">
        🔐 Admin Panel
    </button>

    <button onclick="refreshData()" class="refresh">
        🔄 Refresh Stock
    </button>

    
</div>
    
  <div class="total-stock">
📦 TOTAL : <span id="totalBoxes">0</span> Box Stock
</div>
    
</div>

<script type="module">





    

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
query,
orderBy,
writeBatch,
where,
limit
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* PASTE YOUR FIREBASE CONFIG HERE */




    const firebaseConfig = {
  apiKey: "AIzaSyA6F4ecDn0R_Gf2fMzRTwnEZdp9ENW6qr0",
  authDomain: "shop-stock-bec19.firebaseapp.com",
  projectId: "shop-stock-bec19",
  storageBucket: "shop-stock-bec19.firebasestorage.app",
  messagingSenderId: "849581924489",
  appId: "1:849581924489:web:d4ee4166f7ae7df89fe658"
};



   window.refreshData = async function(){

const btn = document.querySelector(".refresh");

btn.disabled = true;
btn.innerHTML = "Refreshing...";

       
  await loadTiles();

       
btn.disabled = false;
btn.innerHTML = "🔄 Refresh Stock";

}


    

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

let editId=null;
let isAdmin = false;
let draggedRow = null;
    
const ADMIN_PASSWORD = "1234"; // Change this







 function getTimeAgo(dateString){

    const diff = Math.floor((Date.now() - new Date(dateString).getTime()) / 1000);

    // 0-2 minutes
    if(diff < 120){
        return "🟢 Just Now";
    }

    // Less than 1 hour
    if(diff < 3600){
        const mins = Math.floor(diff / 60);
        return `🕒 ${mins} Minute${mins > 1 ? "s" : ""} Ago`;
    }

    // Less than 24 hours
    if(diff < 86400){
        const hrs = Math.floor(diff / 3600);
        return `🕒 ${hrs} Hour${hrs > 1 ? "s" : ""} Ago`;
    }

    // Yesterday (24-48 hours)
    if(diff < 172800){
        return "🕒 Yesterday";
    }

    // More than 2 days
    const days = Math.floor(diff / 86400);
    return `🕒 ${days} Days Ago`;
}



    






    




    async function loadTiles(){

const tbody = document.getElementById("tableBody");

tbody.innerHTML = "";
let totalBoxes = 0;





        


        const snap = await getDocs(collection(db,"tiles"));

let tiles = [];

snap.forEach(d => {

    const data = d.data();

    tiles.push({
        id: d.id,
        ...data,
       order: data.order ?? tiles.length,      // Default order for old items
        boxes: data.boxes ?? 0,           // Default stock
        name: data.name ?? "Unknown",
        size: data.size ?? "-",
        design: data.design ?? "-",
        createdAt: data.createdAt ?? null,
        lastUpdated: data.lastUpdated ?? null
    });

});

// Sort by order
tiles.sort((a, b) => a.order - b.order);



        


        

tiles.forEach(data=>{

totalBoxes += parseInt(data.boxes) || 0;

const isNew =
data.isNew === true &&
data.createdAt &&
(Date.now() - new Date(data.createdAt).getTime()) < (24 * 60 * 60 * 1000);

    
    
tbody.innerHTML += `

<tr data-id="${data.id}" ${isAdmin ? 'draggable="true"' : ''}>


${
isAdmin
?
`
<td class="drag-cell">
    <span class="drag-handle">☰</span>
</td>
`
:
``
}



<td>

${data.name}

${
isNew
?
`<span class="new-badge">NEW</span>`
:
""
}

</td>



<td>${data.size}</td>

<td>${data.design}</td>

<td>

<div class="stock-box">

<div class="stock-count">
📦 ${data.boxes}
</div>

<div class="stock-time">

${
data.lastUpdated
? getTimeAgo(data.lastUpdated)
: "Not Available"
}

</div>

</div>

</td>

<td>

${
isAdmin ?

`
<button class="edit"
onclick="editTile('${data.id}','${data.name}','${data.size}','${data.design}','${data.boxes}')">
Edit
</button>

<button class="delete"
onclick="deleteTile('${data.id}')">
Delete
</button>
`

:

`<span style="color:gray;">View Only</span>`

}

</td>

</tr>

`;

});

document.getElementById("totalBoxes").innerText = totalBoxes;


        if(isAdmin){

const rows=document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

row.addEventListener("dragstart",()=>{

draggedRow=row;
row.classList.add("dragging");

});

row.addEventListener("dragend",()=>{

row.classList.remove("dragging");

});

row.addEventListener("dragover",(e)=>{

e.preventDefault();

});

row.addEventListener("drop",async()=>{

if(draggedRow===row)return;

const tbody=document.getElementById("tableBody");

tbody.insertBefore(draggedRow,row);

await saveOrder();

});

});

}


        


}


    






    async function saveOrder(){

const rows = document.querySelectorAll("#tableBody tr");

const batch = writeBatch(db);

rows.forEach((row,index)=>{

const id = row.dataset.id;

batch.update(
doc(db,"tiles",id),
{
order:index
}
);

});

await batch.commit();

}




    

  window.adminLogin = function(){

const pass = prompt("Enter Admin Password");

if(pass === null) return;

if(pass === ADMIN_PASSWORD){
document.getElementById("saveBtn").style.display="inline-block";
    document.getElementById("adminPanel").style.display = "block";
    
isAdmin = true;
document.getElementById("dragHead").style.display="";
alert("Admin Mode Enabled");

loadTiles();

document.getElementById("adminBtn").innerHTML="🚪 Logout";

document.getElementById("adminBtn").onclick=adminLogout;

}else{

alert("Wrong Password");

}

}





    window.adminLogout=function(){

isAdmin=false;
        document.getElementById("dragHead").style.display="none";
document.getElementById("saveBtn").style.display="none";
        document.getElementById("adminPanel").style.display="none";
 
loadTiles();

document.getElementById("adminBtn").innerHTML="🔐 Admin Panel";

document.getElementById("adminBtn").onclick=adminLogin;

}




    
    window.saveTile=async function(){

        const name = document.getElementById("name").value.trim().toUpperCase();
const size = document.getElementById("size").value.trim().toLowerCase();
        
const design=document.getElementById("design").value.trim();
const boxes=document.getElementById("boxes").value.trim();

if(!name||!size||!design||!boxes){
alert("Please fill all fields");
return;
}


        // Prevent duplicate tile (same name + same size)
if(!editId){

const duplicateQuery = query(
    collection(db, "tiles"),
    where("name", "==", name),
    where("size", "==", size)
);

const duplicateSnap = await getDocs(duplicateQuery);

// Ignore the current tile while editing
const duplicate = duplicateSnap.docs.find(doc => doc.id !== editId);

if (duplicate) {
    alert("❌ This tile is already available in the inventory.");
    return;
}

}

        
        
if(editId){


    await updateDoc(doc(db,"tiles",editId),{

name,
size,
design,
boxes:Number(boxes),
lastUpdated:new Date().toISOString(),
isNew:false

});
    

editId=null;
document.getElementById("saveBtn").innerText = "Save Tile";
}else{

const existingTiles = await getDocs(collection(db,"tiles"));

let maxOrder = -1;

existingTiles.forEach(doc=>{

    const o = doc.data().order;

    if(typeof o === "number" && o > maxOrder){
        maxOrder = o;
    }

});


    await addDoc(collection(db,"tiles"),{

    name,
    size,
    design,
    boxes:Number(boxes),

    order:maxOrder + 1,

    createdAt:new Date().toISOString(),
    lastUpdated:new Date().toISOString(),
    isNew:true

});
    

}




        
document.getElementById("name").value="";
document.getElementById("size").value="";
document.getElementById("design").value="";
document.getElementById("boxes").value="";

    


await loadTiles();
alert(editId ? "✅ Tile updated." : "✅ Tile added.");
}



    window.editTile=function(id,name,size,design,boxes){
editId=id;
document.getElementById("saveBtn").innerText = "Update Tile";
document.getElementById("name").value=name;
document.getElementById("size").value=size;
document.getElementById("design").value=design;
document.getElementById("boxes").value=boxes;

window.scrollTo({
top:0,
behavior:"smooth"
});

}



    
window.deleteTile=async function(id){

if(!confirm("Delete this tile?"))
return;

await deleteDoc(doc(db,"tiles",id));


loadTiles();

}

window.searchTile=function(){

let filter=document.getElementById("search")
.value
.toLowerCase();

let rows=document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

row.style.display=row.innerText
.toLowerCase()
.includes(filter)
? ""
: "none";

});

}







    if(isAdmin){

    document.getElementById("adminPanel").style.display = "block";

    document.getElementById("adminBtn").innerHTML = "🚪 Logout";
    document.getElementById("adminBtn").onclick = adminLogout;


        

}

loadTiles();


    
    

    

</script>
</body>
</html>
