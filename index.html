<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tile Shop Inventory v5</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}


    .refresh{
background:#28a745;
margin-bottom:15px;
}

.refresh:hover{
background:#218838;
}

    
h1{
text-align:center;
margin-bottom:20px;
color:#333;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 18px;
margin-top:12px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}


    .table-container{
width:100%;
overflow-x:auto;
margin-top:15px;
border-radius:10px;
}

table{
width:100%;
min-width:700px;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
white-space:nowrap;
}

th{
background:#007bff;
color:white;
position:sticky;
top:0;
}

.edit,
.delete{
padding:8px 12px;
margin:2px;
border-radius:5px;
}

.edit{
background:#ffc107;
color:black;
}

.delete{
background:#dc3545;
color:white;
}



.stock-box{
display:inline-flex;
flex-direction:column;
align-items:center;
background:#f8f9fa;
padding:8px 12px;
border-radius:10px;
min-width:110px;
}

.stock-count{
font-size:18px;
font-weight:bold;
color:#007bff;
}

.stock-time{
margin-top:4px;
font-size:11px;
color:#666;
line-height:1.3;
}

    

    
    #adminPanel{
display:none;
}

    

    

.search{
margin-bottom:15px;
}



    .bottom-buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-top:20px;
    flex-wrap:wrap;
}

.bottom-buttons button{
    min-width:180px;
}

    


    
</style>
</head>

<body>

<div class="container">





   <h1>Tile Shop Inventory</h1>

    

<!-- Hidden until admin logs in -->
<div id="adminPanel" class="card" style="display:none;">
    
<input id="name" placeholder="Tile Name">

<input id="size" placeholder="Size">

<input id="design" placeholder="Design Number">

<input id="boxes" type="number" placeholder="Boxes">

<button id="saveBtn" onclick="saveTile()">
Save Tile
</button>

</div>

    





    <div class="card">

<input
class="search"
id="search"
placeholder="Search..."
onkeyup="searchTile()">





    
    <div class="table-container">

<table>
    
<thead>
<tr>
<th>Name</th>
<th>Size</th>
<th>Design</th>
<th>Boxes</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody">

</tbody>








    </table>

</div>

</div>

<div class="bottom-buttons">

    <button onclick="adminLogin()" id="adminBtn">
        🔐 Admin Panel
    </button>

    <button onclick="refreshData()" class="refresh">
        🔄 Refresh Stock
    </button>

</div>

</div>

<script type="module">





    

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getFirestore,

collection,

addDoc,

getDocs,

deleteDoc,

doc,

updateDoc

} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* PASTE YOUR FIREBASE CONFIG HERE */




    const firebaseConfig = {
  apiKey: "AIzaSyA6F4ecDn0R_Gf2fMzRTwnEZdp9ENW6qr0",
  authDomain: "shop-stock-bec19.firebaseapp.com",
  projectId: "shop-stock-bec19",
  storageBucket: "shop-stock-bec19.firebasestorage.app",
  messagingSenderId: "849581924489",
  appId: "1:849581924489:web:d4ee4166f7ae7df89fe658"
};



   window.refreshData = async function(){

const btn = document.querySelector(".refresh");

btn.disabled = true;
btn.innerHTML = "Refreshing...";

       
  await loadTiles();

       
btn.disabled = false;
btn.innerHTML = "🔄 Refresh Stock";

}


    

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

let editId=null;
let isAdmin = false;

const ADMIN_PASSWORD = "1234"; // Change this







    
async function loadTiles(){

const tbody=document.getElementById("tableBody");

tbody.innerHTML="";

const snap=await getDocs(collection(db,"tiles"));

snap.forEach(d=>{

const data=d.data();
    

    
    
tbody.innerHTML+=`

<tr>
<td>${data.name}</td>
<td>${data.size}</td>
<td>${data.design}</td>

<td>
<div class="stock-box">
<div class="stock-count">
📦 ${data.boxes}
</div>

<div class="stock-time">
🕒 ${
data.lastUpdated
? new Date(data.lastUpdated).toLocaleString("en-GB", {
    day: "numeric",
    month: "short",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit",
    hour12: true
})
: "Not Available"
}
</div>

</div>
</div>
</td>






<td>

${
isAdmin ?

`
<button class="edit"
onclick="editTile('${d.id}','${data.name}','${data.size}','${data.design}','${data.boxes}')">
Edit
</button>

<button class="delete"
onclick="deleteTile('${d.id}')">
Delete
</button>
`

:

`<span style="color:gray;">View Only</span>`

}

</td>


</tr>

`;

});

}







  window.adminLogin = function(){

const pass = prompt("Enter Admin Password");

if(pass === null) return;

if(pass === ADMIN_PASSWORD){
document.getElementById("saveBtn").style.display="inline-block";
    document.getElementById("adminPanel").style.display = "block";
    
isAdmin = true;

alert("Admin Mode Enabled");

loadTiles();

document.getElementById("adminBtn").innerHTML="🚪 Logout";

document.getElementById("adminBtn").onclick=adminLogout;

}else{

alert("Wrong Password");

}

}





    window.adminLogout=function(){

isAdmin=false;
document.getElementById("saveBtn").style.display="none";
        document.getElementById("adminPanel").style.display="none";
 
loadTiles();

document.getElementById("adminBtn").innerHTML="🔐 Admin Panel";

document.getElementById("adminBtn").onclick=adminLogin;

}




    
    window.saveTile=async function(){

const name=document.getElementById("name").value.trim();
const size=document.getElementById("size").value.trim();
const design=document.getElementById("design").value.trim();
const boxes=document.getElementById("boxes").value.trim();

if(!name||!size||!design||!boxes){
alert("Please fill all fields");
return;
}

if(editId){

await updateDoc(doc(db,"tiles",editId),{

name,
size,
design,
boxes:Number(boxes),
lastUpdated: new Date().toISOString()

});

editId=null;

}else{


    
await addDoc(collection(db,"tiles"),{

name,
size,
design,
boxes:Number(boxes),
lastUpdated: new Date().toISOString()

});

    

}

document.getElementById("name").value="";
document.getElementById("size").value="";
document.getElementById("design").value="";
document.getElementById("boxes").value="";

    

loadTiles();

}



    window.editTile=function(id,name,size,design,boxes){
editId=id;

document.getElementById("name").value=name;
document.getElementById("size").value=size;
document.getElementById("design").value=design;
document.getElementById("boxes").value=boxes;

window.scrollTo({
top:0,
behavior:"smooth"
});

}



    
window.deleteTile=async function(id){

if(!confirm("Delete this tile?"))
return;

await deleteDoc(doc(db,"tiles",id));


loadTiles();

}

window.searchTile=function(){

let filter=document.getElementById("search")
.value
.toLowerCase();

let rows=document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

row.style.display=row.innerText
.toLowerCase()
.includes(filter)
? ""
: "none";

});

}







    if(isAdmin){

    document.getElementById("adminPanel").style.display = "block";

    document.getElementById("adminBtn").innerHTML = "🚪 Logout";
    document.getElementById("adminBtn").onclick = adminLogout;


        

}

loadTiles();


    
    

    

</script>
</body>
</html>
